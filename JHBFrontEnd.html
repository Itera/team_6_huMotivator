<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HuMotivator Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #f4f1e9;
      --bg-2: #e8f1e8;
      --ink: #132a2a;
      --muted: #4c6663;
      --card: #fffef9;
      --accent: #0f8b8d;
      --accent-2: #f2a65a;
      --ok: #1f7a4d;
      --error: #aa3a2a;
      --shadow: 0 20px 60px rgba(16, 42, 42, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, rgba(15, 139, 141, 0.25), transparent 45%),
        radial-gradient(circle at 85% 15%, rgba(242, 166, 90, 0.28), transparent 35%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      overflow-x: hidden;
    }

    .shell {
      width: min(980px, 92vw);
      margin: 3rem auto;
      animation: rise 700ms ease-out both;
    }

    .hero {
      background: color-mix(in srgb, var(--card), white 35%);
      border: 1px solid rgba(19, 42, 42, 0.1);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: clamp(1.25rem, 3.5vw, 2.25rem);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      right: -70px;
      top: -90px;
      border-radius: 50%;
      background: linear-gradient(160deg, rgba(15, 139, 141, 0.28), rgba(242, 166, 90, 0.18));
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-family: "Fraunces", serif;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin-top: 0.8rem;
      color: var(--muted);
      max-width: 56ch;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      gap: 1rem;
      margin-top: 1rem;
      grid-template-columns: 1.1fr 1fr;
    }

    .card {
      background: color-mix(in srgb, var(--card), white 25%);
      border-radius: 20px;
      border: 1px solid rgba(19, 42, 42, 0.12);
      padding: 1rem;
    }

    label {
      font-weight: 700;
      font-size: 0.92rem;
      display: block;
      margin-bottom: 0.45rem;
    }

    textarea,
    select {
      width: 100%;
      border: 1px solid rgba(19, 42, 42, 0.25);
      border-radius: 14px;
      padding: 0.8rem;
      font: inherit;
      background: #fff;
      color: var(--ink);
    }

    textarea {
      resize: vertical;
      min-height: 92px;
    }

    .btn-row {
      margin-top: 0.9rem;
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 0.7rem 1.1rem;
      font: inherit;
      font-weight: 700;
      transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
    }

    .btn-primary {
      background: linear-gradient(120deg, var(--accent), #1a9fa1);
      color: white;
      box-shadow: 0 10px 22px rgba(15, 139, 141, 0.35);
    }

    .btn-secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid rgba(19, 42, 42, 0.2);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .status {
      font-size: 0.9rem;
      min-height: 1.2rem;
      margin-top: 0.55rem;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--error);
    }

    .results {
      display: grid;
      gap: 0.8rem;
      margin-top: 1rem;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .tile {
      background: #fff;
      border-radius: 16px;
      border: 1px solid rgba(19, 42, 42, 0.1);
      padding: 0.8rem;
      min-height: 130px;
      opacity: 0;
      transform: translateY(8px);
      animation: tile-in 380ms ease forwards;
    }

    .tile h3 {
      margin: 0 0 0.45rem;
      font-size: 0.86rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .tile p {
      margin: 0;
      line-height: 1.5;
    }

    .tile.full {
      grid-column: 1 / -1;
    }

    .hint {
      margin-top: 0.65rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes tile-in {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 840px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .results {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>HuMotivator<br />for Teams</h1>
      <p class="subtitle">
        Describe what you need to do and get a blend of practical momentum, playful spark,
        and respectful humor. Built for quick 2-minute demo stories.
      </p>

      <div class="layout">
        <section class="card" aria-label="Motivation input">
          <label for="task">What are you about to do?</label>
          <textarea id="task" placeholder="Example: Prepare tomorrow's hackathon demo intro"></textarea>

          <label for="vibe" style="margin-top: 0.75rem;">Choose your vibe</label>
          <select id="vibe">
            <option value="balanced">Balanced</option>
            <option value="serious">Serious</option>
            <option value="playful">Playful</option>
          </select>

          <div class="btn-row">
            <button class="btn-primary" id="generateBtn" type="button">Generate motivation</button>
            <button class="btn-secondary" id="sampleBtn" type="button">Try sample</button>
          </div>
          <div id="status" class="status" aria-live="polite"></div>
          <p class="hint">Backend URL: <span id="apiBase">http://localhost:8000</span></p>
        </section>

        <section class="card" aria-label="Motivation output">
          <div class="results" id="results">
            <article class="tile full">
              <h3>Ready</h3>
              <p>Enter a task and press Generate motivation.</p>
            </article>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = "http://localhost:8000";
    const taskInput = document.getElementById("task");
    const vibeInput = document.getElementById("vibe");
    const generateBtn = document.getElementById("generateBtn");
    const sampleBtn = document.getElementById("sampleBtn");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");

    document.getElementById("apiBase").textContent = API_BASE;

    function setStatus(message, kind = "") {
      statusEl.className = `status ${kind}`.trim();
      statusEl.textContent = message;
    }

    function renderResult(data) {
      resultsEl.innerHTML = "";

      const blocks = [
        ["Intro", data.intro],
        ["Pep Talk", data.pep_talk],
        ["Quote", data.quote],
        ["Humor", data.joke],
        ["Action Tip", data.action_tip],
        ["Safety", data.safety_note]
      ];

      blocks.forEach(([label, text], index) => {
        const article = document.createElement("article");
        article.className = "tile" + (label === "Pep Talk" ? " full" : "");
        article.style.animationDelay = `${index * 55}ms`;

        const title = document.createElement("h3");
        title.textContent = label;

        const paragraph = document.createElement("p");
        paragraph.textContent = text || "-";

        article.appendChild(title);
        article.appendChild(paragraph);
        resultsEl.appendChild(article);
      });
    }

    async function requestMotivation() {
      const task = taskInput.value.trim();
      const vibe = vibeInput.value;

      if (!task) {
        setStatus("Add a task first so HuMotivator knows what to boost.", "error");
        return;
      }

      generateBtn.disabled = true;
      setStatus("Generating motivation...", "ok");

      try {
        const response = await fetch(`${API_BASE}/api/motivate`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ task, vibe })
        });

        if (!response.ok) {
          const body = await response.text();
          throw new Error(`Backend error (${response.status}): ${body}`);
        }

        const payload = await response.json();
        renderResult(payload);
        setStatus("Done. Motivation loaded.", "ok");
      } catch (error) {
        setStatus(String(error.message || error), "error");
      } finally {
        generateBtn.disabled = false;
      }
    }

    generateBtn.addEventListener("click", requestMotivation);
    sampleBtn.addEventListener("click", () => {
      taskInput.value = "Prep a 2-minute team hackathon demo without panic";
      vibeInput.value = "playful";
      requestMotivation();
    });
  </script>
</body>
</html>
