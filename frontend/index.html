<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HuMotivator Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-warm: #f7f2e8;
      --bg-cool: #e7f3ed;
      --ink: #112d2f;
      --muted: #557071;
      --card: #fffcf4;
      --accent: #0f8b8d;
      --accent-strong: #0c6d6f;
      --edge: rgba(17, 45, 47, 0.12);
      --ok: #216f47;
      --error: #a53d2a;
      --shadow: 0 22px 60px rgba(17, 45, 47, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Space Grotesk", sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(15, 139, 141, 0.22), transparent 45%),
        radial-gradient(circle at 80% 8%, rgba(227, 150, 85, 0.20), transparent 38%),
        linear-gradient(145deg, var(--bg-warm), var(--bg-cool));
    }

    .shell {
      width: min(1040px, 92vw);
      margin: 2.5rem auto;
      animation: rise 500ms ease-out both;
    }

    .hero {
      background: color-mix(in srgb, var(--card), white 22%);
      border: 1px solid var(--edge);
      border-radius: 28px;
      padding: clamp(1.25rem, 4vw, 2.2rem);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -55px;
      top: -75px;
      width: 210px;
      height: 210px;
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(15, 139, 141, 0.28), rgba(227, 150, 85, 0.16));
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-family: "Fraunces", serif;
      font-size: clamp(2.1rem, 5.5vw, 3.9rem);
      line-height: 1.04;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin-top: 0.9rem;
      max-width: 58ch;
      color: var(--muted);
      line-height: 1.55;
    }

    .layout {
      margin-top: 1.1rem;
      display: grid;
      grid-template-columns: 1.04fr 1fr;
      gap: 1rem;
    }

    .card {
      background: color-mix(in srgb, var(--card), white 18%);
      border: 1px solid var(--edge);
      border-radius: 20px;
      padding: 1rem;
    }

    label {
      display: block;
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 0.45rem;
    }

    textarea,
    select {
      width: 100%;
      border: 1px solid rgba(17, 45, 47, 0.26);
      border-radius: 14px;
      padding: 0.82rem;
      font: inherit;
      color: var(--ink);
      background: #ffffff;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    .buttons {
      margin-top: 0.95rem;
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease, box-shadow 160ms ease;
      padding: 0.72rem 1.12rem;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    .primary {
      background: linear-gradient(110deg, var(--accent), var(--accent-strong));
      color: #fff;
      box-shadow: 0 12px 24px rgba(15, 139, 141, 0.35);
    }

    .secondary {
      background: #ffffff;
      color: var(--ink);
      border: 1px solid rgba(17, 45, 47, 0.22);
    }

    .status {
      min-height: 1.2rem;
      margin-top: 0.65rem;
      font-size: 0.9rem;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--error);
    }

    .response-grid {
      display: grid;
      gap: 0.8rem;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .tile {
      background: #ffffff;
      border: 1px solid rgba(17, 45, 47, 0.12);
      border-radius: 16px;
      padding: 0.82rem;
      min-height: 124px;
      animation: tileIn 360ms ease both;
      transform: translateY(8px);
      opacity: 0;
    }

    .tile.full {
      grid-column: 1 / -1;
      min-height: auto;
    }

    .tile h3 {
      margin: 0 0 0.44rem;
      font-size: 0.83rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .tile p {
      margin: 0;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .hint {
      margin-top: 0.56rem;
      font-size: 0.84rem;
      color: var(--muted);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes tileIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .response-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>HuMotivator<br />for Demo Day</h1>
      <p class="subtitle">
        Describe your next task and get a short motivational boost with practical momentum,
        intelligent humor, and safe professional tone.
      </p>

      <div class="layout">
        <section class="card" aria-label="Motivation input form">
          <label for="taskInput">What are you about to do?</label>
          <textarea id="taskInput" placeholder="Example: Prepare the 2-minute hackathon presentation"></textarea>

          <label for="modelSelect" style="margin-top: 0.75rem">Model</label>
          <select id="modelSelect"></select>

          <div class="buttons">
            <button type="button" id="generateBtn" class="primary">Generate motivation</button>
            <button type="button" id="sampleBtn" class="secondary">Use sample task</button>
          </div>

          <div id="status" class="status" aria-live="polite"></div>
          <p class="hint">Backend: <span id="apiBase"></span></p>
        </section>

        <section class="card" aria-label="Motivation response">
          <div id="responseGrid" class="response-grid">
            <article class="tile full">
              <h3>Ready</h3>
              <p>Select a model, enter a task, and click Generate motivation.</p>
            </article>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
